services:
  hermes-gateway:
    image: ${HERMES_IMAGE_NAME}
    build:
      context: ..
      dockerfile: hermes-docker/Dockerfile
      args:
        HERMES_BASE_IMAGE: ${HERMES_BASE_IMAGE}
    container_name: ${HERMES_CONTAINER_NAME}
    working_dir: /workspace
    env_file:
      - ${HERMES_RUNTIME_ENV_FILE}
    environment:
      HERMES_HOME: /opt/data
      HERMES_BOOTSTRAP_HOME: /workspace/hermes-docker/runtime/bootstrap
      HERMES_AUTO_UPDATE: ${HERMES_AUTO_UPDATE:-true}
      HERMES_AUTO_UPDATE_ARGS: ${HERMES_AUTO_UPDATE_ARGS:---yes --gateway}
      HERMES_AUTO_UPDATE_REQUIRED: ${HERMES_AUTO_UPDATE_REQUIRED:-false}
    ports:
      - "127.0.0.1:${HERMES_GATEWAY_PORT}:${HERMES_GATEWAY_PORT}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ${HERMES_WORKSPACE_ROOT}:/workspace:rw
      - hermes_state:/opt/data:rw
    command:
      - gateway
      - run

  hermes-dashboard:
    image: ${HERMES_IMAGE_NAME}
    build:
      context: ..
      dockerfile: hermes-docker/Dockerfile
      args:
        HERMES_BASE_IMAGE: ${HERMES_BASE_IMAGE}
    container_name: hermes-dashboard
    working_dir: /workspace
    profiles:
      - dashboard
    env_file:
      - ${HERMES_RUNTIME_ENV_FILE}
    environment:
      HERMES_HOME: /opt/data
      HERMES_BOOTSTRAP_HOME: /workspace/hermes-docker/runtime/bootstrap
      HERMES_AUTO_UPDATE: ${HERMES_AUTO_UPDATE:-true}
      HERMES_AUTO_UPDATE_ARGS: ${HERMES_AUTO_UPDATE_ARGS:---yes --gateway}
      HERMES_AUTO_UPDATE_REQUIRED: ${HERMES_AUTO_UPDATE_REQUIRED:-false}
    ports:
      - "127.0.0.1:${HERMES_DASHBOARD_PORT}:9119"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ${HERMES_WORKSPACE_ROOT}:/workspace:rw
      - hermes_state:/opt/data:rw
    command:
      - dashboard
      - --host
      - 0.0.0.0
      - --port
      - "9119"
      - --no-open
      - --insecure

volumes:
  hermes_state:
